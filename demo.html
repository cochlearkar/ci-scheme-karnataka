<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shravan Sanjeevini — Application Demo</title>
<style>
:root {
  --green-dark:#0a3d2e;--green:#1a6b4a;--green-mid:#1D9E75;--green-light:#E1F5EE;--green-border:#9FE1CB;
  --blue:#1a4a7a;--blue-mid:#378ADD;--blue-light:#E6F1FB;
  --amber:#8a5a0a;--amber-mid:#EF9F27;--amber-light:#FAEEDA;
  --red:#A32D2D;--red-light:#FCEBEB;--purple:#4a2a7a;
  --surface:#fffcf8;--border:#e8e4dc;--text:#1a1612;--text-light:#8a8278;--gray:#f5f3ef;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--green-dark);min-height:100vh;overflow-x:hidden;}
.outer{display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:16px 16px 36px;}
.demo-header{text-align:center;padding:14px 0 18px;color:#fff;}
.demo-header h1{font-size:20px;font-weight:700;letter-spacing:-.3px;}
.demo-header p{font-size:12px;color:rgba(255,255,255,.55);margin-top:4px;}
.slide-counter{font-size:11px;color:rgba(255,255,255,.45);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.progress-bar{flex:1;height:3px;background:rgba(255,255,255,.15);border-radius:2px;max-width:200px;}
.progress-fill{height:100%;background:var(--green-mid);border-radius:2px;transition:width .3s;}
.phone{width:100%;max-width:360px;background:var(--surface);border-radius:28px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5);min-height:580px;position:relative;}
.phone-notch{height:26px;background:#111;display:flex;align-items:center;justify-content:center;}
.phone-notch-pill{width:70px;height:7px;background:#333;border-radius:4px;}
.phone-content{min-height:554px;overflow:hidden;}
/* slide transition */
.phone-content{transition:opacity .3s;}
.phone-content.fade{opacity:0;}
.nav-row{display:flex;gap:10px;margin-top:16px;max-width:360px;width:100%;}
.nav-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.nav-prev{background:rgba(255,255,255,.12);color:#fff;}
.nav-next{background:#fff;color:var(--green-dark);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.controls-row{display:flex;gap:8px;margin-top:10px;max-width:360px;width:100%;}
.ctrl-btn{flex:1;padding:8px;border:1px solid rgba(255,255,255,.2);border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);}
.ctrl-btn.active{background:rgba(255,255,255,.2);color:#fff;border-color:rgba(255,255,255,.4);}
.dots{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap;justify-content:center;max-width:360px;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .2s;cursor:pointer;}
.dot.active{background:#fff;transform:scale(1.4);}
.dot.done{background:rgba(255,255,255,.5);}
.slide-label{color:rgba(255,255,255,.6);font-size:11px;margin-top:10px;text-align:center;max-width:360px;line-height:1.4;}
.creds-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:14px 16px;margin-top:16px;max-width:360px;width:100%;}
.creds-title{color:rgba(255,255,255,.6);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.creds-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid rgba(255,255,255,.1);}
.creds-row:last-child{border:none;}
.creds-role{font-size:12px;color:rgba(255,255,255,.75);}
.creds-val{font-size:11px;color:#fff;font-family:monospace;background:rgba(255,255,255,.1);padding:2px 8px;border-radius:4px;}
.app-link{display:block;text-align:center;margin-top:12px;color:#fff;font-size:13px;text-decoration:none;background:var(--green-mid);padding:12px;border-radius:10px;font-weight:600;max-width:360px;width:100%;}
/* ── SCREEN COMPONENTS ── */
.sh{padding:13px 15px 11px;color:#fff;}
.sh.green{background:var(--green-dark);}
.sh.blue{background:var(--blue);}
.sh.amber{background:#7a4f1a;}
.sh.purple{background:var(--purple);}
.sh.wa{background:#128C7E;}
.sh-title{font-size:15px;font-weight:600;}
.sh-sub{font-size:10px;opacity:.65;margin-top:1px;}
.chip-b{display:inline-block;background:rgba(255,255,255,.18);color:#fff;padding:2px 9px;border-radius:9px;font-size:10px;font-weight:600;margin-top:5px;}
.bp{padding:12px 14px;}
.slbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-light);margin:10px 0 6px;}
.slbl:first-child{margin-top:0;}
.ac{background:var(--surface);border:.5px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
.ac.pr{background:var(--red);border-color:var(--red);}
.ac.pg{background:var(--green-dark);border-color:var(--green-dark);}
.ac.pb{background:var(--blue);border-color:var(--blue);}
.ac.pp{background:var(--purple);border-color:var(--purple);}
.ac.gd{background:linear-gradient(135deg,#1d4ed8,#4338ca);border:none;}
.ac.gr{background:linear-gradient(135deg,#0a3d2e,#1a6b4a);border:none;}
.ac.gw{background:linear-gradient(135deg,#128C7E,#25D366);border:none;}
.ac.ga{background:linear-gradient(135deg,#7a4f1a,#b87333);border:none;}
.ai{font-size:20px;flex-shrink:0;}
.at{font-size:12px;font-weight:600;}
.ad{font-size:10px;opacity:.7;margin-top:1px;}
.w{color:#fff;}.w.ad{opacity:.8;}
.ar{margin-left:auto;font-size:14px;opacity:.45;}
.srow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
.sb{background:var(--surface);border:.5px solid var(--border);border-radius:9px;padding:9px;text-align:center;}
.sn{font-size:19px;font-weight:700;}
.sl{font-size:8px;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-top:1px;}
.cc{background:var(--surface);border:.5px solid var(--border);border-radius:9px;padding:10px 11px;margin-bottom:6px;border-left:4px solid transparent;}
.cc.r{border-left-color:var(--red);}
.cc.g{border-left-color:var(--green-mid);}
.cn{font-size:12px;font-weight:500;}
.cs{font-size:10px;color:var(--text-light);margin-top:2px;}
.pill{display:inline-block;padding:2px 7px;border-radius:7px;font-size:9px;font-weight:600;margin-top:3px;}
.pr2{background:#FCEBEB;color:var(--red);}
.pg2{background:var(--green-light);color:var(--green);}
.pb2{background:var(--blue-light);color:var(--blue);}
.pa2{background:#FAEEDA;color:var(--amber);}
.pp2{background:#EEEDFE;color:var(--purple);}
.ic{border-radius:9px;padding:11px 13px;margin-bottom:9px;}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:5px 9px;margin-top:7px;}
.il{font-size:8px;font-weight:700;text-transform:uppercase;opacity:.65;}
.iv{font-size:11px;font-weight:500;margin-top:1px;}
.fs{background:var(--surface);border:.5px solid var(--border);border-radius:9px;padding:10px 13px;margin-bottom:7px;}
.ft{font-size:10px;font-weight:700;color:var(--text-light);text-transform:uppercase;margin-bottom:6px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:6px;}
.fl{font-size:9px;color:var(--text-light);margin-bottom:2px;}
.fv{font-size:11px;font-weight:500;}
.ts{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{padding:8px 11px;font-size:10px;color:var(--text-light);white-space:nowrap;border-bottom:2px solid transparent;}
.tab.a{color:var(--green-dark);border-bottom-color:var(--green-dark);font-weight:600;}
.pi{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:.5px solid var(--border);}
.pd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pbw{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.pb3{height:100%;border-radius:2px;}
.j{display:flex;align-items:center;overflow-x:auto;padding:6px 0;}
.jstep{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
.jc{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;background:var(--surface);}
.jc.done{background:var(--green-mid);border-color:var(--green-mid);color:#fff;}
.jc.act{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue);}
.jl{font-size:7px;color:var(--text-light);margin-top:2px;text-align:center;max-width:32px;}
.jline{width:18px;height:2px;background:var(--border);flex-shrink:0;margin-top:-9px;}
.jline.done{background:var(--green-mid);}
.sc2{background:#fff;border:1px solid #c4b8f8;border-radius:9px;padding:9px 11px;margin-bottom:7px;}
.st2{font-size:9px;font-weight:700;color:var(--purple);text-transform:uppercase;margin-bottom:5px;}
.hr{display:flex;align-items:center;padding:7px 0;border-bottom:.5px solid var(--border);gap:7px;}
.hdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.hn{flex:1;font-size:10px;font-weight:500;}
.wa-prev{background:#ECE5DD;padding:10px;border-radius:9px;margin:7px 0;}
.wa-bub{background:#fff;border-radius:7px 7px 7px 0;padding:9px 11px;font-size:11px;line-height:1.5;color:#1a1a1a;max-width:92%;box-shadow:0 1px 2px rgba(0,0,0,.1);}
.wa-t{font-size:9px;color:#667781;margin-top:3px;text-align:right;}
</style>
</head>
<body>
<div class="outer">

<div class="demo-header">
  <div style="font-size:38px;margin-bottom:8px">🦻</div>

</div><!-- end outer -->

// Names shown as initials, mobiles masked — matching demo account behaviour
var D = {

// ── SLIDE HELPER FUNCTIONS ────────────────────────────────────────────────────
function rb(icon,label,desc,bg,col){
  return '<div style="background:'+bg+';border-radius:11px;padding:11px;cursor:pointer">'
    +'<div style="font-size:22px;margin-bottom:3px">'+icon+'</div>'
    +'<div style="font-size:11px;font-weight:600;color:'+col+'">'+label+'</div>'
    +'<div style="font-size:9px;color:'+col+';opacity:.7">'+desc+'</div>'
    +'</div>';
}
function ir(l,v,col){
  return '<div><div class="il" style="color:'+(col||'var(--green)')+'">'+l+'</div>'
    +'<div class="iv" style="color:'+(col||'var(--green-dark)')+'">'+v+'</div></div>';
}
function fd(l,v){ return '<div><div class="fl">'+l+'</div><div class="fv">'+v+'</div></div>'; }
function js(icon,label,done,act){
  var cls=done?'done':act?'act':'';
  return '<div class="jstep"><div class="jc '+cls+'">'+(done?'✓':icon)+'</div><div class="jl">'+label+'</div></div>';
}
function jl(done){ return '<div class="jline'+(done?' done':'')+'"></div>'; }
function sc(n,en,sel){
  return '<div style="text-align:center;padding:4px 2px;border:1px solid '+(sel?'#4a2a7a':'var(--border)')+';border-radius:5px;font-size:9px;background:'+(sel?'#4a2a7a':'var(--surface)')+'"><div style="font-weight:700;color:'+(sel?'#fff':'var(--text)')+'">'+n+'</div><div style="font-size:8px;color:'+(sel?'rgba(255,255,255,.7)':'var(--text-light)')+'">'+en+'</div></div>';
}
function hr2(name,total,upd,pend,pct){
  return '<div style="background:var(--surface);border:.5px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:5px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
    +'<div style="font-size:11px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+name+'</div>'
    +'<div style="display:flex;gap:4px;flex-shrink:0">'
    +'<span class="pill pr2">'+pend+' pend</span><span class="pill pg2">'+upd+' done</span>'
    +'</div></div>'
    +'<div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">'
    +'<div style="width:'+pct+'%;height:100%;background:var(--green-mid);border-radius:2px"></div></div></div>';
}
function ms(n,l,c){
  return '<div style="background:var(--surface);border:.5px solid var(--border);border-radius:7px;padding:7px;text-align:center">'
    +'<div style="font-size:15px;font-weight:700;color:'+c+'">'+n+'</div>'
    +'<div style="font-size:8px;color:var(--text-light);text-transform:uppercase;font-weight:600;margin-top:1px">'+l+'</div>'
    +'</div>';
}
function mtr(dist,zone,total,done,pct){
  return '<tr><td style="padding:4px 7px">'+dist+'<div style="font-size:8px;color:var(--text-light)">'+zone+'</div></td>'
    +'<td style="padding:4px 7px;text-align:center">'+total+'</td>'
    +'<td style="padding:4px 7px;text-align:center;color:var(--green);font-weight:600">'+done+'</td>'
    +'<td style="padding:4px 7px;text-align:center">'+pct+'%</td></tr>';
}
function cr(role,user){
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:.5px solid rgba(255,255,255,.1)">'
    +'<span style="color:rgba(255,255,255,.8);font-size:11px">'+role+'</span>'
    +'<span style="font-size:10px;color:#fff;font-family:monospace;background:rgba(255,255,255,.1);padding:2px 7px;border-radius:4px">'+user+'</span>'
    +'</div>';
}

// 4. HOSPITAL FORM

// ── AUTO-PLAY ENGINE ──────────────────────────────────────────────────────────
var autoInterval = null;
var AUTO_DURATION = 6000; // 6 seconds per slide
var autoPlaying = false;

function toggleAuto() {
  var btn = document.getElementById('btn-auto');
  if (!autoPlaying) {
    autoPlaying = true;
    btn.style.background = 'rgba(255,255,255,.25)';
    btn.style.color = '#fff';
    btn.textContent = '⏸ Pause';
    startAuto();
  } else {
    autoPlaying = false;
    btn.style.background = 'rgba(255,255,255,.08)';
    btn.style.color = 'rgba(255,255,255,.8)';
    btn.textContent = '▶ Play Demo';
    clearInterval(autoInterval);
  }
}

function startAuto() {
  clearInterval(autoInterval);
  autoInterval = setInterval(function() {
    if (current < SLIDES.length - 1) {
      current++;
      render();
    } else {
      // Loop back
      current = 0;
      render();
    }
  }, AUTO_DURATION);
}

// ── SLIDE ENGINE ──────────────────────────────────────────────────────────────
var current = 0;

function render() {
  var s = SLIDES[current];
  var el = document.getElementById('slide-content');
  el.classList.add('fade');
  setTimeout(function() {
    el.innerHTML = s.html;
    el.classList.remove('fade');
  }, 150);

  document.getElementById('slide-label').textContent = s.label;
  document.getElementById('slide-counter-text').textContent = (current+1) + ' / ' + SLIDES.length;
  document.getElementById('progress-fill').style.width = Math.round(((current+1)/SLIDES.length)*100) + '%';


  var dots = document.getElementById('dots');
  dots.innerHTML = SLIDES.map(function(_, i) {
    var cls = i===current?'dot active':i<current?'dot done':'dot';
    return '<div class="'+cls+'" onclick="goTo('+i+')"></div>';
  }).join('');
}

function nextSlide() {
  if (current < SLIDES.length - 1) { current++; }
  else { current = 0; }
  render();
  if (autoPlaying) startAuto();
}
function prevSlide() {
  if (current > 0) { current--; render(); }
  if (autoPlaying) startAuto();
}
function goTo(i) { current = i; render(); if (autoPlaying) startAuto(); }

// Keyboard (swipe still works on mobile)
document.addEventListener('keydown', function(e) {
  if (e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); nextSlide(); }
  if (e.key==='ArrowLeft') { e.preventDefault(); prevSlide(); }
});

// Swipe
var tx = 0;
document.addEventListener('touchstart', function(e) { tx = e.touches[0].clientX; });
document.addEventListener('touchend', function(e) {
  var diff = tx - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) { diff > 0 ? nextSlide() : prevSlide(); }
});

render();
</script>
