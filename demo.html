<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Shravan Sanjeevini — Application Demo</title>
<style>
:root {
  --green-dark: #0a3d2e;
  --green: #1a6b4a;
  --green-mid: #1D9E75;
  --green-light: #E1F5EE;
  --blue: #1a4a7a;
  --blue-mid: #378ADD;
  --blue-light: #E6F1FB;
  --amber: #8a5a0a;
  --amber-mid: #EF9F27;
  --red: #A32D2D;
  --purple: #4a2a7a;
  --surface: #fffcf8;
  --border: #e8e4dc;
  --text: #1a1612;
  --text-light: #8a8278;
  --gray: #f5f3ef;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--green-dark); min-height: 100vh; overflow-x: hidden; }

/* ── OUTER LAYOUT ── */
.outer { display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 16px 40px; }

/* ── HEADER ── */
.demo-header { text-align: center; padding: 20px 0 24px; color: #fff; }
.demo-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -.3px; }
.demo-header p { font-size: 13px; color: rgba(255,255,255,.6); margin-top: 5px; }

/* ── SLIDE COUNTER ── */
.slide-counter { font-size: 11px; color: rgba(255,255,255,.5); margin-bottom: 12px; }

/* ── PHONE FRAME ── */
.phone { width: 100%; max-width: 360px; background: var(--surface); border-radius: 32px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,.5); min-height: 600px; position: relative; }
.phone-notch { height: 28px; background: #111; display: flex; align-items: center; justify-content: center; }
.phone-notch-pill { width: 80px; height: 8px; background: #333; border-radius: 4px; }
.phone-content { min-height: 572px; }

/* ── NAVIGATION ── */
.nav-row { display: flex; gap: 12px; margin-top: 20px; max-width: 360px; width: 100%; }
.nav-btn { flex: 1; padding: 13px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity .15s; }
.nav-prev { background: rgba(255,255,255,.15); color: #fff; }
.nav-next { background: #fff; color: var(--green-dark); }
.nav-btn:disabled { opacity: .3; cursor: not-allowed; }

/* ── PROGRESS DOTS ── */
.dots { display: flex; gap: 6px; margin-top: 16px; flex-wrap: wrap; justify-content: center; max-width: 360px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,.25); transition: background .2s, transform .2s; cursor: pointer; }
.dot.active { background: #fff; transform: scale(1.3); }
.dot.done { background: rgba(255,255,255,.6); }

/* ── SLIDE LABEL ── */
.slide-label { color: rgba(255,255,255,.7); font-size: 12px; margin-top: 12px; text-align: center; max-width: 360px; }

/* ── CREDENTIALS BOX ── */
.creds-box { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 12px; padding: 14px 16px; margin-top: 20px; max-width: 360px; width: 100%; }
.creds-title { color: rgba(255,255,255,.7); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
.creds-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid rgba(255,255,255,.1); }
.creds-row:last-child { border-bottom: none; }
.creds-role { font-size: 12px; color: rgba(255,255,255,.8); }
.creds-val { font-size: 11px; color: #fff; font-family: monospace; background: rgba(255,255,255,.1); padding: 2px 8px; border-radius: 4px; }
.app-link { display: block; text-align: center; margin-top: 16px; color: #fff; font-size: 13px; text-decoration: none; background: var(--green-mid); padding: 12px; border-radius: 10px; font-weight: 600; max-width: 360px; width: 100%; }
.app-link:hover { opacity: .9; }

/* ── SCREEN COMPONENTS (mini versions for demo) ── */
.screen-header { padding: 14px 16px 12px; color: #fff; }
.screen-header.green { background: var(--green-dark); }
.screen-header.blue  { background: var(--blue); }
.screen-header.amber { background: #7a4f1a; }
.screen-header.purple{ background: var(--purple); }
.screen-header.wa    { background: #128C7E; }
.sh-title { font-size: 16px; font-weight: 600; }
.sh-sub   { font-size: 11px; opacity: .65; margin-top: 2px; }
.chip-badge { display: inline-block; background: rgba(255,255,255,.2); color: #fff; padding: 2px 10px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-top: 6px; }

.body-pad { padding: 14px 16px; }
.section-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--text-light); margin: 12px 0 8px; }
.section-lbl:first-child { margin-top: 0; }

.action-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 13px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
.action-card.primary-red  { background: var(--red); border-color: var(--red); }
.action-card.primary-green{ background: var(--green-dark); border-color: var(--green-dark); }
.action-card.primary-blue { background: var(--blue); border-color: var(--blue); }
.action-card.primary-purp { background: var(--purple); border-color: var(--purple); }
.action-card.grad-dash { background: linear-gradient(135deg,#1d4ed8,#4338ca); border: none; }
.action-card.grad-rep  { background: linear-gradient(135deg,#0a3d2e,#1a6b4a); border: none; }
.action-card.grad-wa   { background: linear-gradient(135deg,#128C7E,#25D366); border: none; }
.action-card.grad-rep2 { background: linear-gradient(135deg,#7a4f1a,#b87333); border: none; }
.ac-icon  { font-size: 22px; flex-shrink: 0; }
.ac-title { font-size: 13px; font-weight: 600; }
.ac-desc  { font-size: 11px; opacity: .7; margin-top: 1px; }
.ac-arr   { margin-left: auto; font-size: 16px; opacity: .5; }
.ac-title.white, .ac-desc.white { color: #fff; }
.ac-desc.white { opacity: .8; }

.stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stat-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 700; }
.stat-lbl { font-size: 9px; color: var(--text-light); text-transform: uppercase; font-weight: 600; margin-top: 2px; }

.case-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 11px 12px; margin-bottom: 7px; border-left: 4px solid transparent; }
.case-card.red   { border-left-color: var(--red); }
.case-card.green { border-left-color: var(--green-mid); }
.case-name { font-size: 13px; font-weight: 500; }
.case-sub  { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 600; margin-top: 4px; }
.pill-red   { background: #FCEBEB; color: var(--red); }
.pill-green { background: var(--green-light); color: var(--green); }
.pill-blue  { background: var(--blue-light); color: var(--blue); }
.pill-amber { background: #FAEEDA; color: var(--amber); }

.info-card { background: var(--green-light); border: 1px solid #9FE1CB; border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.info-card.blue { background: var(--blue-light); border-color: #B5D4F4; }
.info-card.amber { background: #FFF8EE; border-color: #FAC775; }
.info-card.purple { background: #EEEDFE; border-color: #c4b8f8; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 10px; margin-top: 8px; }
.info-label { font-size: 9px; font-weight: 700; text-transform: uppercase; color: inherit; opacity: .7; }
.info-val   { font-size: 12px; font-weight: 500; margin-top: 1px; }

.form-section { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.fs-title { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; margin-bottom: 8px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.field-lbl { font-size: 10px; color: var(--text-light); margin-bottom: 3px; }
.field-val { font-size: 12px; font-weight: 500; }

.tab-strip { display: flex; overflow-x: auto; background: var(--surface); border-bottom: 1px solid var(--border); }
.tab { padding: 9px 12px; font-size: 11px; color: var(--text-light); white-space: nowrap; border-bottom: 2px solid transparent; }
.tab.active { color: var(--green-dark); border-bottom-color: var(--green-dark); font-weight: 600; }

.prog-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
.prog-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.prog-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.prog-bar { height: 100%; border-radius: 2px; }

.journey { display: flex; align-items: center; gap: 0; overflow-x: auto; padding: 8px 0; }
.j-step { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.j-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; background: var(--surface); }
.j-circle.done { background: var(--green-mid); border-color: var(--green-mid); color: #fff; }
.j-circle.active { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue); }
.j-label { font-size: 8px; color: var(--text-light); margin-top: 3px; text-align: center; max-width: 36px; }
.j-line { width: 20px; height: 2px; background: var(--border); flex-shrink: 0; margin-top: -10px; }
.j-line.done { background: var(--green-mid); }

.score-section { background: var(--surface); border: 1px solid #c4b8f8; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
.score-title { font-size: 10px; font-weight: 700; color: var(--purple); text-transform: uppercase; margin-bottom: 6px; }
.score-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 3px 0; }
.score-fill { height: 100%; border-radius: 3px; }
.score-num { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-light); }

.hosp-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 0.5px solid var(--border); gap: 8px; }
.hosp-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.hosp-name { flex: 1; font-size: 11px; font-weight: 500; }
.hosp-badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge-sm { font-size: 9px; padding: 2px 6px; border-radius: 6px; font-weight: 600; }

.wa-preview { background: #ECE5DD; padding: 12px; border-radius: 10px; margin: 8px 0; }
.wa-bubble { background: #fff; border-radius: 8px 8px 8px 0; padding: 10px 12px; font-size: 12px; line-height: 1.5; color: #1a1a1a; max-width: 90%; box-shadow: 0 1px 2px rgba(0,0,0,.1); }
.wa-time { font-size: 10px; color: #667781; margin-top: 4px; text-align: right; }
</style>
</head>
<body>
<div class="outer">

  <div class="demo-header">
    <div style="font-size:40px;margin-bottom:10px">🦻</div>
    <h1>Shravan Sanjeevini</h1>
    <p>Karnataka Cochlear Implant Programme · NPPCD<br>Interactive Application Demo</p>
  </div>

  <div class="slide-counter" id="slide-counter">Slide 1 of 12</div>

  <!-- PHONE FRAME -->
  <div class="phone">
    <div class="phone-notch"><div class="phone-notch-pill"></div></div>
    <div class="phone-content" id="slide-content"></div>
  </div>

  <!-- NAV -->
  <div class="nav-row">
    <button class="nav-btn nav-prev" id="btn-prev" onclick="prevSlide()">← Previous</button>
    <button class="nav-btn nav-next" id="btn-next" onclick="nextSlide()">Next →</button>
  </div>

  <div class="dots" id="dots"></div>
  <div class="slide-label" id="slide-label"></div>

  <!-- CREDENTIALS -->
  <div class="creds-box">
    <div class="creds-title">🔑 Demo Login Credentials</div>
    <div class="creds-row"><span class="creds-role">🏥 Hospital</span><span class="creds-val">demo_hospital / Demo@2025</span></div>
    <div class="creds-row"><span class="creds-role">🎧 Rehab</span><span class="creds-val">demo_rehab / Demo@2025</span></div>
    <div class="creds-row"><span class="creds-role">📍 District</span><span class="creds-val">demo_district / Demo@2025</span></div>
    <div class="creds-row"><span class="creds-role">🌐 State</span><span class="creds-val">demo_state / Demo@2025</span></div>
  </div>
  <a class="app-link" href="https://cochlearkar.github.io/ci-scheme-karnataka/" target="_blank">
    🚀 Open Live Application
  </a>

</div>

<script>

// ── SLIDE ENGINE ──────────────────────────────────────────────────────────────
let current = 0;

function render() {
  const s = SLIDES[current];
  document.getElementById('slide-content').innerHTML = s.html;
  document.getElementById('slide-label').textContent = s.label;
  document.getElementById('slide-counter').textContent = `Slide ${current+1} of ${SLIDES.length}`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').textContent = current === SLIDES.length-1 ? '✓ Done' : 'Next →';

  // Dots
  const dots = document.getElementById('dots');
  dots.innerHTML = SLIDES.map((_, i) => {
    const cls = i === current ? 'dot active' : i < current ? 'dot done' : 'dot';
    return `<div class="${cls}" onclick="goTo(${i})"></div>`;
  }).join('');
}

function nextSlide() {
  if (current < SLIDES.length - 1) { current++; render(); scrollToTop(); }
}
function prevSlide() {
  if (current > 0) { current--; render(); scrollToTop(); }
}
function goTo(i) { current = i; render(); scrollToTop(); }
function scrollToTop() {
  document.querySelector('.outer').scrollTop = 0;
  window.scrollTo(0, 0);
}

// Swipe support
let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) { diff > 0 ? nextSlide() : prevSlide(); }
});

render();
</script>
